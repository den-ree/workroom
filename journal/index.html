<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Journal: building products, creative coding, music, AI, and staying creative.">
    <link rel="canonical" href="https://denree.nl/journal">
    <meta property="og:title" content="Journal - Den Ree Workroom">
    <meta property="og:description" content="Journal: building products, creative coding, music, AI, and staying creative.">
    <meta property="og:url" content="https://denree.nl/journal">
    <meta property="og:type" content="website">
    <title>Journal - Den Ree Workroom</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
    <link rel="icon" type="image/png" href="/assets/favicon.png">
</head>
<body>
    <!-- Header -->
    <header class="header" id="header">
        <nav class="navbar">
            <div class="navbar-container">
                <a href="/" class="logo">Den Ree</a>

                <button class="mobile-menu-toggle" id="mobileMenuToggle" aria-label="Toggle menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>

                <ul class="nav-menu" id="navMenu">
                    <li class="nav-item"><a href="/#apps" class="nav-link">Apps</a></li>
                    <li class="nav-item"><a href="/#music" class="nav-link">Music</a></li>
                    <li class="nav-item"><a href="/journal" class="nav-link active">Journal</a></li>
                </ul>

                <a href="/#contact" class="cta-button header-cta">CONTACT</a>
            </div>
        </nav>
    </header>

    <main>
        <!-- Page Header -->
        <section class="page-header">
            <div class="container">
                <h1 class="page-title">Journal</h1>
                <p class="page-subtitle">Notes about making music with livecoding, building apps, experimenting with AI.</p>
            </div>
        </section>

        <section class="section">
            <div class="container">

                <!-- Active filter display — populated by JS when a tag is tapped -->
                <div class="journal-active-filter" id="journalActiveFilter"></div>

                <!-- Notes -->
                <div class="grid grid--rows" id="journalGrid">

                    <div class="card card--blog-row" data-thread="ai" data-status="finished">
                        <div class="card-meta">
                            <small class="card-date">Feb 28, 2026</small>
                            <small class="card-date">Rotterdam</small>
                        </div>
                        <div class="card-body">
                            <span class="card-status card-status--finished">finished</span>
                            <h3 class="card-title">
                                <a href="/journal/wearing-the-suit">Wearing the Suit</a>
                            </h3>
                            <div class="card-badges">
                                <span class="badge badge--thread badge--ai">working with AI</span>
                                <span class="badge">tools</span>
                            </div>
                        </div>
                    </div>

                    <div class="card card--blog-row" data-thread="ai" data-status="finished">
                        <div class="card-meta">
                            <small class="card-date">Sep 11, 2025</small>
                            <small class="card-date">Amsterdam</small>
                        </div>
                        <div class="card-body">
                            <span class="card-status card-status--finished">finished</span>
                            <h3 class="card-title">
                                <a href="/journal/why-blanche">Why blanche?</a>
                            </h3>
                            <div class="card-badges">
                                <span class="badge badge--thread badge--ai">working with AI</span>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer" id="site-footer"></footer>

    <script src="/js/main.js"></script>
    <script src="/js/background-code.js"></script>
    <script>
        const cards = document.querySelectorAll('#journalGrid .card--blog-row');
        const activeFilterEl = document.getElementById('journalActiveFilter');
        let activeTag = null;

        function applyFilter(tag) {
            cards.forEach(card => {
                if (!tag) {
                    card.classList.remove('is-hidden');
                    return;
                }
                const match = Array.from(card.querySelectorAll('.badge'))
                    .some(b => b.textContent.trim() === tag);
                card.classList.toggle('is-hidden', !match);
            });
        }

        function showChip(label, badgeClass) {
            activeFilterEl.innerHTML =
                `<span class="journal-tag-chip ${badgeClass}" id="activeTagChip">
                    ${label} <span class="journal-tag-chip__remove">×</span>
                </span>`;
            document.getElementById('activeTagChip').addEventListener('click', clearFilter);
        }

        function clearFilter() {
            activeTag = null;
            activeFilterEl.innerHTML = '';
            applyFilter(null);
        }

        document.querySelectorAll('#journalGrid .badge').forEach(badge => {
            badge.style.cursor = 'pointer';
            badge.addEventListener('click', e => {
                e.stopPropagation();
                const label = badge.textContent.trim();

                if (activeTag === label) {
                    clearFilter();
                    return;
                }

                activeTag = label;

                // Carry badge classes to chip so thread colors apply
                const chipClass = badge.className.replace('badge', '').trim();
                showChip(label, 'badge ' + chipClass);
                applyFilter(label);
            });
        });
    </script>
</body>
</html>
